# The name of your app. Shows up in logs. Can be anything.
spring.application.name=emailapp

# Run the web server on port 8080.
# When you open a browser and go to http://localhost:8080, this app answers.
server.port=8080

# Tell Spring Boot where to find the H2 database.
# jdbc:h2:file:./data/emaildb means:
#   - use H2 database engine
#   - store it as a FILE (not in memory) at ./data/emaildb
#   - "." means the folder where you run the app from
# This means data SURVIVES when you restart the app.
spring.datasource.url=jdbc:h2:file:./data/emaildb

# These are the H2 driver and login credentials.
# H2's default username is "sa" and password is blank.
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ddl-auto=update means:
#   Spring Boot will automatically CREATE or UPDATE your database tables
#   based on your Java classes. You never need to write SQL CREATE TABLE manually.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true prints every SQL query to your terminal so you can see what's happening.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# This turns on a web page at http://localhost:8080/h2-console
# where you can open your database like a spreadsheet and run SQL queries.
# Very useful for debugging.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret key. This is used to sign and verify login tokens.
# IMPORTANT: Replace this with a long random string. Never share it.
# Must be at least 32 characters long.
app.jwt.secret=my-super-secret-key-for-jwt-signing
app.jwt.expiration-ms=86400000 # 24 hours in milliseconds